<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Стенд: SQL-инъекция</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-1" aria-hidden="true"></div>
    <div class="bg-shape shape-2" aria-hidden="true"></div>

    <main class="container">
      <section class="card" id="login-card">
        <p class="eyebrow">Практическая работа</p>
        <h1>Демонстрация идеи SQL-инъекции</h1>
        <p class="description">
          Простая демонстрация логики входа для презентации проекта.
        </p>

        <form id="login-form" class="form">
          <label>
            Логин
            <input id="username" type="text" placeholder="" required />
          </label>

          <label>
            Пароль
            <input id="password" type="password" placeholder="" required />
          </label>

          <button type="submit" class="btn btn-primary">Войти</button>
        </form>

        <p id="message" class="message" role="status" aria-live="polite"></p>
      </section>

      <section class="card hidden" id="account-card">
        <p class="eyebrow">Доступ получен</p>
        <h2>Банковский кабинет</h2>
        <div class="balance-box">
          <p class="balance-label">Баланс:</p>
          <p class="balance-value">13 000 BTC</p>
        </div>

        <div class="note"><strong>Статус:</strong> доступ к профилю открыт.</div>

        <button id="logout-btn" class="btn btn-ghost">Выйти</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
